<template>
    <div class="slds-box slds-theme_default">
        <h2 class="slds-text-heading_small">Transporter Selection</h2>

        <lightning-radio-group
            name="transporter"
            label="choix de transporteur"
            options={options}
            value={selectedOption}
            onchange={handleChangeOptions}
            type="radio">
        </lightning-radio-group>

        <template if:true={displayAutresTransporters}>
            <lightning-combobox
                name="autresTransporters"
                label="Liste des transporteurs disponibles"
                value={selectedTransporter}
                placeholder="Veuillez choisir un transporteur"
                options={comboBoxOptions}
                onchange={handleTransporterChange}>
            </lightning-combobox>
        </template>
    </div>
</template>
