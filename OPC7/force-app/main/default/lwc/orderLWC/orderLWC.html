<template>
    <lightning-card title="Veuillez choisir votre transporteur" icon-name="standard:Order">
           <!-- Affichage des tableaux de commandes du responsable commercial-->
            <template if:true= {isresponsableCommercialTable}>
                <lightning-datatable data= {OrderProducts}
                                     columns= {columnsResponsableCommercial}
                                     key-field="Id"
                                     hide-checkbox-column="false"
                                     onrowaction= {handleRowAction}>
                </lightning-datatable>
                </template>   
       <!-- Affichage d'un message en cas d'erreur lors du chargement des commandes -->
        <template if:true= {error}>
            <p class="slds-text-color_error">
                Une erreur est survenue lors du chargement des commandes.
            </p>
        </template>
    </lightning-card>
</template>
